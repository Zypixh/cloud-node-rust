syntax = "proto3";

package pb;

import "models/model_user.proto";
import "models/model_plan.proto";
import "models/model_server.proto";

option go_package = "./pb";

message UserPlan {
    int64 id = 1;
    int64 userId = 2;
    int64 planId = 3;
    bool isOn = 4;
    string dayTo = 5;
    string name = 6;
    User user = 30;
    Plan plan = 31;
    repeated Server servers = 33;
}
