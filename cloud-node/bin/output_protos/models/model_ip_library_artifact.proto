syntax = "proto3";

package pb;

import "models/model_file.proto";

option go_package = "./pb";

message IPLibraryArtifact {
    int64 id = 1;
    int64 fileId = 2;
    int64 createdAt = 3;
    bytes metaJSON = 4;
    bool isPublic = 5;
    string name = 6;
    string code = 7;
    File file = 30;
}
