syntax = "proto3";

package pb;

import "models/model_node.proto";
import "models/model_node_cluster.proto";

option go_package = "./pb";

message NodeTask {
    int64 id = 1;
    string type = 2;
    bool isDone = 3;
    bool isOk = 4;
    string error = 5;
    int64 updatedAt = 6;
    int64 version = 7;
    bool isPrimary = 8;
    int64 serverId = 9;
    int64 userId = 10;
    Node node = 30;
    NodeCluster nodeCluster = 31;
    NodeCluster server = 32;
}
