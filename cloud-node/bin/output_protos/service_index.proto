syntax = "proto3";

package index;

option go_package = "./pb";

service IndexService {
    rpc registerNode(RegisterNodeRequest) returns (RegisterNodeResponse);
    rpc writeKey(WriteKeyRequest) returns (WriteKeyResponse);
    rpc writeKeys(WriteKeysRequest) returns (WriteKeysResponse);
    rpc readKey(ReadKeyRequest) returns (ReadKeyResponse);
    rpc deleteKey(DeleteKeyRequest) returns (DeleteKeyResponse);
}

message RegisterNodeRequest {
    uint64 nodeId = 1;
    uint64 nodeGroupId = 3;
    string nodeIP = 2;
}

message RegisterNodeResponse {
    
}

message WriteKeyRequest {
    uint64 nodeId = 1;
    string hash = 2;
    uint64 expiresAt = 3;
}

message WriteKeyResponse {
    
}

message WriteKeysRequest {
    repeated WriteKeyRequest requests = 1;
}

message WriteKeysResponse {
    
}

message ReadKeyRequest {
    uint64 nodeId = 1;
    uint64 nodeGroupId = 3;
    string hash = 2;
}

message ReadKeyResponse {
    bool isOk = 1;
    string nodeIP = 2;
}

message DeleteKeyRequest {
    uint64 nodeId = 1;
    string hash = 2;
}

message DeleteKeyResponse {
    
}
