syntax = "proto3";

package caches;

option go_package = "../caches";

message PBItem {
    int32 type = 1;
    string key = 2;
    int64 expiresAt = 3;
    int64 staleAt = 4;
    int64 headerSize = 5;
    int64 bodySize = 6;
    int64 metaSize = 7;
    string host = 8;
    int64 serverId = 9;
    int64 createdAt = 11;
}
