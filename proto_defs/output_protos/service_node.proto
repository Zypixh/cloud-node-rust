}

message FindCurrentNodeConfigResponse {
    bytes nodeJSON = 1;
    bool isChanged = 2;
    bool isCompressed = 3;
    int64 dataSize = 4;
    int64 timestamp = 5;
}

message NodeStreamMessage {
    int64 nodeId = 1;
    int64 requestId = 2;
    int32 timeoutSeconds = 3;
    string code = 4;
    bytes dataJSON = 5;
    bool isOk = 6;
    string message = 7;
}

message UpdateNodeStatusRequest {
    int64 nodeId = 1;
    bytes statusJSON = 2;
}

message CountAllEnabledNodesMatchRequest {
    int64 nodeClusterId = 1;
    int32 installState = 2;
    int32 activeState = 3;
    string keyword = 4;
    int64 nodeGroupId = 5;
    int64 nodeRegionId = 6;
    int32 level = 7;
}

message UpdateNodeIsInstalledRequest {
    int64 nodeId = 1;
    bool isInstalled = 2;
}

message InstallNodeRequest {
    int64 nodeId = 1;
}

message InstallNodeResponse {
    
}

message UpgradeNodeRequest {
    int64 nodeId = 1;
}

message UpgradeNodeResponse {
    
}

message StartNodeRequest {
    int64 nodeId = 1;
}

message StartNodeResponse {
    bool isOk = 1;
    string error = 2;
}

message StopNodeRequest {
    int64 nodeId = 1;
}

message StopNodeResponse {
    bool isOk = 1;
    string error = 2;
}

message UninstallNodeRequest {
    int64 nodeId = 1;
}

message UninstallNodeResponse {
    bool isOk = 1;
    string error = 2;
}

message UpdateNodeConnectedAPINodesRequest {
    repeated int64 apiNodeIds = 1;
}

message CountAllEnabledNodesWithNodeGrantIdRequest {
    int64 nodeGrantId = 1;
}

message FindAllEnabledNodesWithNodeGrantIdRequest {
