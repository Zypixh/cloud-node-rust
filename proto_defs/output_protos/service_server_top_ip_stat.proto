syntax = "proto3";

package pb;

import "models/rpc_messages.proto";

option go_package = "./pb";

service ServerTopIPStatService {
    rpc uploadServerTopIPStats(UploadServerTopIPStatsRequest) returns (RPCSuccess);
    rpc listServerTopIPStats(ListServerTopIPStatsRequest) returns (ListServerTopIPStatsResponse);
}

message UploadServerTopIPStatsRequest {
    repeated Stat stats = 1;
    message Stat {
        uint64 serverId = 1;
        string ip = 2;
        uint32 countRequests = 3;
        string day = 4;
        string timeAt = 5;
    }
}

message ListServerTopIPStatsRequest {
    int64 serverId = 1;
    string day = 2;
    string timeAt = 3;
    int64 size = 4;
}

message ListServerTopIPStatsResponse {
    repeated Stat stats = 1;
    message Stat {
        string ip = 2;
        uint64 countRequests = 3;
        bool isDenied = 4;
        bool isAllowed = 5;
    }
    
    uint64 totalRequests = 2;
}
