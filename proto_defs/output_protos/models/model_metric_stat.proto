syntax = "proto3";

package pb;

import "models/model_node_cluster.proto";
import "models/model_node.proto";
import "models/model_server.proto";

option go_package = "./pb";

message MetricStat {
    int64 id = 1;
    string hash = 2;
    int64 serverId = 3;
    int64 itemId = 4;
    repeated string keys = 5;
    float value = 6;
    string time = 7;
    int32 version = 8;
    NodeCluster nodeCluster = 30;
    Node node = 31;
    Server server = 32;
    int64 sumCount = 40;
    float sumTotal = 41;
}

message UploadingMetricStat {
    int64 id = 1;
    string hash = 2;
    repeated string keys = 3;
    float value = 4;
}
