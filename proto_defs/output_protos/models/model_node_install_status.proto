syntax = "proto3";

package pb;

option go_package = "./pb";

message NodeInstallStatus {
    bool isRunning = 1;
    bool isFinished = 2;
    bool isOk = 3;
    string error = 4;
    string errorCode = 6;
    int64 updatedAt = 5;
    
    repeated Step Steps = 7;
    message Step {
        string name = 1;
        string description = 2;
        float percent = 3;
    }
}
