syntax = "proto3";

package pb;

import "models/model_node.proto";
import "models/model_server.proto";

option go_package = "./pb";

message ServerEvent {
    int64 id = 1;
    int64 serverId = 2;
    string type = 3;
    bytes paramsJSON = 4;
    int64 createdAt = 5;
    bool isRead = 6;
    Node node = 30;
    Server server = 31;
}
