syntax = "proto3";

package pb;

import "models/model_node_cluster.proto";

option go_package = "./pb";

message NodeIPAddress {
    int64 id = 1;
    int64 nodeId = 2;
    string name = 3;
    string ip = 4;
    string description = 5;
    int64 state = 6;
    int64 order = 7;
    bool canAccess = 8;
    bool isOn = 9;
    bool isUp = 10;
    string role = 12;
    string backupIP = 13;
    bool canHealthCheck = 15;
    bool isHealthy = 14;
    bytes dnsRoutes = 16;
    repeated NodeCluster nodeClusters = 30;
}
