syntax = "proto3";

package pb;

import "models/model_node_cluster.proto";

option go_package = "./pb";

message HTTPCacheTaskKey {
    int64 id = 1;
    int64 taskId = 2;
    string key = 3;
    string type = 4;
    string keyType = 5;
    bool isDone = 6;
    bool isDoing = 9;
    bytes errorsJSON = 7;
    int64 nodeClusterId = 8;
    NodeCluster nodeCluster = 30;
}
