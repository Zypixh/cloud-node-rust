name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # 1. 前置检查任务，用于判定平台
  check:
    runs-on: ubuntu-latest
    # 如果是在 Codeberg 上，这个 job 也会卡住，但它只有一个
    # 所以我们通过 if 条件让它直接从定义上消失
    if: github.server_url == 'https://github.com'
    outputs:
      is_github: ${{ steps.check.outputs.is_github }}
    steps:
      - id: check
        run: echo "is_github=true" >> $GITHUB_OUTPUT

  build:
    name: Build - ${{ matrix.platform.name }}
    needs: check
    if: needs.check.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            name: linux-arm64
          - os: macos-latest
            target: aarch64-apple-darwin
            name: macos-arm64

    runs-on: ${{ matrix.platform.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.platform.target }}

      - name: Install dependencies (Linux)
        if: matrix.platform.os == 'ubuntu-latest'
        run: |
          sudo apt-get update || true
          sudo apt-get install -y cmake build-essential golang-go
          if [ "${{ matrix.platform.target }}" == "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          fi

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.platform.target }}" == "aarch64-unknown-linux-gnu" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
            export CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc
            export CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++
          fi
          cargo build --release --target ${{ matrix.platform.target }}

      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.platform.target }}/release
          tar -czf ../../../cloud-node-rust-${{ matrix.platform.name }}.tar.gz cloud-node-rust
          cd ../../../

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cloud-node-rust-${{ matrix.platform.name }}
          path: cloud-node-rust-${{ matrix.platform.name }}.tar.gz

  release:
    name: Create Release
    needs: [check, build]
    if: needs.check.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
