name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build - ${{ matrix.name }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- x86_64 Variants ---
          - target: x86_64-unknown-linux-gnu
            cpu: x86-64-v2
            name: linux-x64-v2-sse4.2
            rustflags: "-C target-cpu=x86-64-v2 -C opt-level=3 -C lto=fat -C codegen-units=1 -C embed-bitcode=yes -C target-feature=+pclmulqdq"
            cxxflags: "-mpclmul -msse4.2"
          - target: x86_64-unknown-linux-gnu
            cpu: x86-64-v3
            name: linux-x64-v3-avx2
            rustflags: "-C target-cpu=x86-64-v3 -C opt-level=3 -C lto=fat -C codegen-units=1 -C embed-bitcode=yes -C target-feature=+pclmulqdq"
            cxxflags: "-mpclmul -msse4.2"
          - target: x86_64-unknown-linux-gnu
            cpu: x86-64-v4
            name: linux-x64-v4-avx512
            rustflags: "-C target-cpu=x86-64-v4 -C opt-level=3 -C lto=fat -C codegen-units=1 -C embed-bitcode=yes -C target-feature=+pclmulqdq"
            cxxflags: "-mpclmul -msse4.2"

          # --- ARM64 Variants ---
          - target: aarch64-unknown-linux-gnu
            cpu: generic
            name: linux-arm64-generic
            rustflags: "-C opt-level=3 -C lto=fat -C codegen-units=1 -C target-feature=+neon,+crypto,+crc -C embed-bitcode=yes"
            cxxflags: ""
          - target: aarch64-unknown-linux-gnu
            cpu: neoverse-n1
            name: linux-arm64-neoverse-n1
            rustflags: "-C target-cpu=neoverse-n1 -C opt-level=3 -C lto=fat -C codegen-units=1 -C embed-bitcode=yes"
            cxxflags: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies & Cross-Linkers
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential golang-go
          if [ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          fi

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          # Important: Include the unique variant name and flags in the cache key
          key: ${{ matrix.name }}-${{ matrix.target }}
          env-vars: "RUSTFLAGS CXXFLAGS CFLAGS"

      - name: Build
        shell: bash
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
          CXXFLAGS: ${{ matrix.cxxflags }}
          CFLAGS: ${{ matrix.cxxflags }}
        run: |
          # 1. Handle ARM Linkers
          if [ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
            export CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc
            export CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++
          fi
          
          cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          ORIGINAL_BINARY="cloud-node-rust"
          TARGET_BINARY="cloud-node"
          PACKAGE_NAME="cloud-node-rust-${{ matrix.name }}"
          
          mkdir -p dist
          cp target/${{ matrix.target }}/release/$ORIGINAL_BINARY dist/$TARGET_BINARY
          cd dist
          tar -czf ../$PACKAGE_NAME.tar.gz $TARGET_BINARY
          cd ..

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: cloud-node-rust-${{ matrix.name }}.tar.gz

  build-legacy:
    name: Build - linux-x64-legacy-glibc217
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache legacy cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            .cargo-legacy/registry
            .cargo-legacy/git
            target-legacy
          key: legacy-glibc217-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            legacy-glibc217-${{ runner.os }}-

      - name: Build legacy package
        shell: bash
        env:
          RUSTFLAGS: "-C target-cpu=x86-64 -C opt-level=3 -C lto=fat -C codegen-units=1 -C embed-bitcode=yes"
          PROTOC_VERSION: "25.3"
        run: |
          mkdir -p .cargo-legacy/registry .cargo-legacy/git target-legacy
          docker run --rm \
            -v "$PWD":/work \
            -v "$PWD/.cargo-legacy/registry":/root/.cargo/registry \
            -v "$PWD/.cargo-legacy/git":/root/.cargo/git \
            -w /work \
            -e CARGO_TARGET_DIR=/work/target-legacy \
            -e RUSTFLAGS="$RUSTFLAGS" \
            -e PROTOC_VERSION="$PROTOC_VERSION" \
            quay.io/pypa/manylinux2014_x86_64 \
            /bin/bash -lc '
              set -euo pipefail
              yum install -y perl perl-core cmake3 make git golang which curl unzip
              ln -sf /usr/bin/cmake3 /usr/local/bin/cmake
              curl -L "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip" -o /tmp/protoc.zip
              unzip -q /tmp/protoc.zip -d /opt/protoc
              export PATH="/opt/protoc/bin:${PATH}"
              curl https://sh.rustup.rs -sSf | sh -s -- -y
              source /root/.cargo/env
              rustup target add x86_64-unknown-linux-gnu
              cargo build --release --target x86_64-unknown-linux-gnu
            '

      - name: Package
        shell: bash
        run: |
          ORIGINAL_BINARY="cloud-node-rust"
          TARGET_BINARY="cloud-node"
          PACKAGE_NAME="cloud-node-rust-linux-x64-legacy-glibc217"

          mkdir -p dist
          cp target-legacy/x86_64-unknown-linux-gnu/release/$ORIGINAL_BINARY dist/$TARGET_BINARY
          cd dist
          tar -czf ../$PACKAGE_NAME.tar.gz $TARGET_BINARY
          cd ..

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64-legacy-glibc217
          path: cloud-node-rust-linux-x64-legacy-glibc217.tar.gz

  release:
    name: Create Release
    needs:
      - build
      - build-legacy
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare Release Notes
        shell: bash
        run: |
          mkdir -p .github/release-body
          if [ -f "release-notes/${GITHUB_REF_NAME}.md" ]; then
            cp "release-notes/${GITHUB_REF_NAME}.md" .github/release-body/body.md
          else
            {
              echo "# ${GITHUB_REF_NAME}"
              echo
              echo "未找到对应的发布说明文件：release-notes/${GITHUB_REF_NAME}.md"
            } > .github/release-body/body.md
          fi

      - name: Package TOA Sources
        shell: bash
        run: |
          tar -czf cloud-node-rust-toa-main-source.tar.gz toa-main
          tar -czf cloud-node-rust-toa-sender-source.tar.gz toa-sender

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: .github/release-body/body.md
          files: |
            artifacts/**/*.tar.gz
            cloud-node-rust-toa-main-source.tar.gz
            cloud-node-rust-toa-sender-source.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
