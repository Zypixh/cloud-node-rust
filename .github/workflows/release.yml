name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build - ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- x86_64 Variants ---
          - target: x86_64-unknown-linux-gnu
            cpu: x86-64-v2
            name: linux-x64-v2-sse4.2
          - target: x86_64-unknown-linux-gnu
            cpu: x86-64-v3
            name: linux-x64-v3-avx2
          - target: x86_64-unknown-linux-gnu
            cpu: x86-64-v4
            name: linux-x64-v4-avx512

          # --- ARM64 Variants ---
          - target: aarch64-unknown-linux-gnu
            cpu: generic
            name: linux-arm64-generic
          - target: aarch64-unknown-linux-gnu
            cpu: neoverse-n1
            name: linux-arm64-neoverse-n1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies & Cross-Linkers
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential golang-go
          if [ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          fi

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.name }}

      - name: Build
        shell: bash
        run: |
          # 1. Handle ARM Linkers
          if [ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
            export CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc
            export CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++
          fi
          
          # 2. Set Optimization Flags
          # LTO=fat is used for maximum cross-crate performance (Pingora/BoringSSL)
          # embed-bitcode=yes is required for LTO to work properly
          export RUSTFLAGS="-C target-cpu=${{ matrix.cpu }} -C opt-level=3 -C lto=fat -C codegen-units=1 -C embed-bitcode=yes"
          
          # 3. Special handling for ARM generic
          if [ "${{ matrix.cpu }}" == "generic" ] && [ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]; then
             export RUSTFLAGS="-C opt-level=3 -C lto=fat -C codegen-units=1 -C target-feature=+neon,+crypto,+crc -C embed-bitcode=yes"
          fi

          cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          ORIGINAL_BINARY="cloud-node-rust"
          TARGET_BINARY="cloud-node"
          PACKAGE_NAME="cloud-node-rust-${{ matrix.name }}"
          
          mkdir -p dist
          cp target/${{ matrix.target }}/release/$ORIGINAL_BINARY dist/$TARGET_BINARY
          cd dist
          tar -czf ../$PACKAGE_NAME.tar.gz $TARGET_BINARY
          cd ..

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: cloud-node-rust-${{ matrix.name }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
