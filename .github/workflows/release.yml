name: Release

on:
  push:
    # 依然监听标签推送
    tags:
      - 'v*'

jobs:
  build:
    name: Build - ${{ matrix.platform.name }}
    # 核心技巧：只有在真正推送到 Zypixh/cloud-node-rust (GitHub 地址) 时才启用这些任务
    # Codeberg 的仓库名通常不包含这个路径，或者 server_url 不同
    if: github.repository == 'Zypixh/cloud-node-rust' && github.server_url == 'https://github.com'
    runs-on: ${{ matrix.platform.os }}
    strategy:
      matrix:
        platform:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            name: linux-arm64
          - os: macos-latest
            target: aarch64-apple-darwin
            name: macos-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.platform.target }}

      - name: Install dependencies (Linux)
        if: matrix.platform.os == 'ubuntu-latest'
        run: |
          sudo apt-get update || true
          sudo apt-get install -y cmake build-essential golang-go
          if [ "${{ matrix.platform.target }}" == "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          fi

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.platform.target }}" == "aarch64-unknown-linux-gnu" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
            export CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc
            export CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++
          fi
          cargo build --release --target ${{ matrix.platform.target }}

      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.platform.target }}/release
          tar -czf ../../../cloud-node-rust-${{ matrix.platform.name }}.tar.gz cloud-node-rust
          cd ../../../

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cloud-node-rust-${{ matrix.platform.name }}
          path: cloud-node-rust-${{ matrix.platform.name }}.tar.gz

  release:
    name: Create Release
    needs: build
    # 同样在这里增加 guard
    if: github.repository == 'Zypixh/cloud-node-rust' && github.server_url == 'https://github.com'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
