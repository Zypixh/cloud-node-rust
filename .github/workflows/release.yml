name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # 将所有逻辑合并，并使用动态矩阵彻底消除非 GitHub 环境下的运行器请求
  build:
    name: Build - ${{ matrix.platform.name }}
    if: github.server_url == 'https://github.com'
    strategy:
      fail-fast: false
      matrix:
        # 只有在 GitHub 域名下才会生成平台列表，否则为空数组 []
        # 空数组会导致此 Job 不产生任何实例，从而不触发运行器申请
        platform: ${{ fromJSON((github.server_url == 'https://github.com') && '[{"os":"ubuntu-latest","target":"x86_64-unknown-linux-gnu","name":"linux-x64"},{"os":"ubuntu-latest","target":"aarch64-unknown-linux-gnu","name":"linux-arm64"},{"os":"macos-latest","target":"aarch64-apple-darwin","name":"macos-arm64"}]' || '[]') }}

    runs-on: ${{ matrix.platform.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.platform.target }}

      - name: Install dependencies (Linux)
        if: matrix.platform.os == 'ubuntu-latest'
        run: |
          sudo apt-get update || true
          sudo apt-get install -y cmake build-essential golang-go
          if [ "${{ matrix.platform.target }}" == "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          fi

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.platform.target }}" == "aarch64-unknown-linux-gnu" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
            export CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc
            export CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++
          fi
          cargo build --release --target ${{ matrix.platform.target }}

      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.platform.target }}/release
          tar -czf ../../../cloud-node-rust-${{ matrix.platform.name }}.tar.gz cloud-node-rust
          cd ../../../

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cloud-node-rust-${{ matrix.platform.name }}
          path: cloud-node-rust-${{ matrix.platform.name }}.tar.gz

  # 同样的技巧应用到 release 任务
  release:
    name: Create Release
    needs: build
    if: github.server_url == 'https://github.com'
    strategy:
      matrix:
        # 确保只有在 GitHub 且 build 成功后才产生 1 个任务实例
        env: ${{ fromJSON((github.server_url == 'https://github.com') && '["github"]' || '[]') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
